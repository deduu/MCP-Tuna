# Codex CLI — ~/.codex/config.toml (or .codex/config.toml for project scope)
#
# Stdio mode (recommended — Codex launches the server automatically)
[mcp_servers.transcendence]
command = "transcendence-gateway"

[mcp_servers.transcendence.env]
OPENAI_API_KEY = "sk-..."
HF_TOKEN = "hf_..."

# -- OR: HTTP mode (connect to a running server) --
# [mcp_servers.transcendence]
# url = "http://localhost:8000/mcp"

# -- OR: Split servers (lightweight, per-task) --
# [mcp_servers.transcendence-data]
# command = "transcendence-data"

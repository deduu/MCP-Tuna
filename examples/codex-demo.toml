# Codex CLI — Demo config (data + train servers only)
# Place at ~/.codex/config.toml or .codex/config.toml (project scope)
#
# Minimal setup for demo: generate data from docs + fine-tune.
# Uses split servers to keep tool count low (~30 tools total).

[mcp_servers.mcp-tuna-data]
command = "mcp-tuna-data"

[mcp_servers.mcp-tuna-data.env]
OPENAI_API_KEY = "sk-..."

[mcp_servers.mcp-tuna-train]
command = "mcp-tuna-train"

[mcp_servers.mcp-tuna-train.env]
HF_TOKEN = "hf_..."

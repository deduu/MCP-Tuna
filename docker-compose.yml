services:
  postgres:
    image: postgres:16
    container_name: insights_pg
    environment:
      POSTGRES_USER: insights
      POSTGRES_PASSWORD: insights
      POSTGRES_DB: insights_db
    ports:
      - "55432:5432" # Change if local PostgreSQL already uses 5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  mcp-tuna-gateway:
    build:
      context: .
      target: gpu
    container_name: mcp_tuna_gateway
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - model-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  pgdata:
  model-cache:
